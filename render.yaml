# Render Blueprint for deploying the Next.js app as a Node Web Service

services:
  - type: web
    name: ed-cell-web
    env: node
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        fromSecret: NEXT_PUBLIC_SUPABASE_URL
      - key: SUPABASE_SERVICE_ROLE_KEY
        fromSecret: SUPABASE_SERVICE_ROLE_KEY
      - key: ADMIN_SETUP_SECRET
        fromSecret: ADMIN_SETUP_SECRET
      - key: NEXT_PUBLIC_EVENTS_IMAGES_BUCKET
        fromSecret: NEXT_PUBLIC_EVENTS_IMAGES_BUCKET